<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Pad-Lattice logo</title>
  <desc id="desc">A Launchpad-inspired four-color control lattice for coding agents.</desc>
  <defs>
    <linearGradient id="case" x1="128" x2="896" y1="96" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#242735"/>
      <stop offset="1" stop-color="#090b12"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#000000" flood-opacity=".35"/>
    </filter>
    <filter id="blue-glow" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="0" stdDeviation="26" flood-color="#2f80ff" flood-opacity=".85"/>
    </filter>
    <filter id="yellow-glow" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="0" stdDeviation="26" flood-color="#ffd43b" flood-opacity=".85"/>
    </filter>
    <filter id="green-glow" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="0" stdDeviation="26" flood-color="#34d058" flood-opacity=".85"/>
    </filter>
    <filter id="red-glow" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="0" stdDeviation="26" flood-color="#ff4d5e" flood-opacity=".85"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="196" fill="#080a10"/>
  <rect x="104" y="104" width="816" height="816" rx="150" fill="url(#case)" filter="url(#shadow)"/>

  <g opacity=".22" stroke="#9aa4b2" stroke-width="10" stroke-linecap="round">
    <path d="M256 256h512M256 384h512M256 512h512M256 640h512M256 768h512"/>
    <path d="M256 256v512M384 256v512M512 256v512M640 256v512M768 256v512"/>
  </g>

  <g fill="none" stroke="#f8fafc" stroke-linecap="round" stroke-linejoin="round" opacity=".5">
    <path d="M512 310v404" stroke-width="18"/>
    <path d="M310 512h404" stroke-width="18"/>
    <circle cx="512" cy="512" r="42" stroke-width="16"/>
  </g>

  <g>
    <rect x="420" y="198" width="184" height="184" rx="40" fill="#2f80ff" filter="url(#blue-glow)"/>
    <rect x="642" y="420" width="184" height="184" rx="40" fill="#ffd43b" filter="url(#yellow-glow)"/>
    <rect x="420" y="642" width="184" height="184" rx="40" fill="#34d058" filter="url(#green-glow)"/>
    <rect x="198" y="420" width="184" height="184" rx="40" fill="#ff4d5e" filter="url(#red-glow)"/>
  </g>

  <g fill="#f8fafc">
    <path d="M486 463l86 49-86 49v-33h-58v-32h58z"/>
    <circle cx="612" cy="512" r="16"/>
  </g>
</svg>
