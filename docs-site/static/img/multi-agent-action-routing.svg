<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title description">
  <title id="title">Targeted action routing for multiple agents</title>
  <desc id="description">An Approve pad press becomes a semantic action event. The daemon checks the explicitly selected identity, its current state, a live matching capability, and the debounce window. It then delivers the action to only the oldest matching request for session B. Subscribers for other sessions and the next request receive nothing.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#78909b"/>
    </marker>
    <marker id="deliver-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#276749"/>
    </marker>
  </defs>

  <rect width="1200" height="520" fill="#ffffff"/>
  <g font-family="Arial">
    <text x="24" y="25" fill="#49616c" font-size="13" font-weight="700">CURRENT ROUTING CONTEXT</text>

    <rect x="24" y="42" width="1152" height="91" rx="6" fill="#f4f8fa" stroke="#b8cbd2"/>
    <g>
      <text x="46" y="66" fill="#60747d" font-size="11" font-weight="700">SELECTED IDENTITY</text>
      <rect x="46" y="76" width="252" height="38" rx="6" fill="#fcf5fc" stroke="#c83ec9" stroke-width="2"/>
      <circle cx="66" cy="95" r="8" fill="#c83ec9"/>
      <text x="83" y="100" fill="#314c57" font-family="monospace" font-size="13" font-weight="700">codex / session-b</text>

      <text x="328" y="66" fill="#60747d" font-size="11" font-weight="700">CURRENT STATE</text>
      <rect x="328" y="76" width="210" height="38" rx="6" fill="#fff8e7" stroke="#d39a18"/>
      <circle cx="348" cy="95" r="7" fill="#d39a18"/>
      <text x="364" y="100" fill="#895f08" font-size="13" font-weight="700">WAITING FOR APPROVAL</text>

      <text x="568" y="66" fill="#60747d" font-size="11" font-weight="700">LIVE CAPABILITY</text>
      <rect x="568" y="76" width="250" height="38" rx="6" fill="#f3faf5" stroke="#6aa57e"/>
      <circle cx="588" cy="95" r="7" fill="#35a94a"/>
      <text x="604" y="100" fill="#276749" font-family="monospace" font-size="13" font-weight="700">approve / request c42a</text>

      <text x="848" y="66" fill="#60747d" font-size="11" font-weight="700">SURFACE PROMISE</text>
      <rect x="848" y="76" width="306" height="38" rx="6" fill="#f3faf5" stroke="#6aa57e"/>
      <rect x="866" y="84" width="22" height="22" rx="5" fill="#35a94a"/>
      <text x="900" y="100" fill="#276749" font-size="13" font-weight="700">Approve is bright and actionable</text>
    </g>

    <text x="24" y="165" fill="#49616c" font-size="13" font-weight="700">ONE PHYSICAL PRESS</text>
    <text x="830" y="165" fill="#49616c" font-size="13" font-weight="700">CONNECTED SUBSCRIBERS</text>

    <g>
      <rect x="24" y="184" width="172" height="196" rx="6" fill="#f4f8fa" stroke="#2e7289" stroke-width="2"/>
      <text x="110" y="211" fill="#174e62" font-size="14" font-weight="700" text-anchor="middle">MIDI SURFACE</text>
      <rect x="66" y="232" width="88" height="88" rx="8" fill="#111827" stroke="#374151" stroke-width="2"/>
      <rect x="84" y="250" width="52" height="52" rx="8" fill="#35a94a"/>
      <text x="110" y="280" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">APPROVE</text>
      <text x="110" y="341" fill="#536871" font-size="12" text-anchor="middle">profile maps address</text>
      <text x="110" y="359" fill="#536871" font-size="12" text-anchor="middle">to semantic action</text>
    </g>

    <path d="M196 282H226" fill="none" stroke="#78909b" stroke-width="2" marker-end="url(#arrow)"/>

    <g>
      <rect x="234" y="218" width="174" height="126" rx="6" fill="#f2f7fb" stroke="#5e91b5" stroke-width="2"/>
      <text x="321" y="244" fill="#315f82" font-size="13" font-weight="700" text-anchor="middle">SEMANTIC EVENT</text>
      <rect x="252" y="260" width="138" height="49" rx="6" fill="#ffffff" stroke="#9db2bb"/>
      <text x="321" y="281" fill="#314c57" font-family="monospace" font-size="12" text-anchor="middle">ActionPressed(</text>
      <text x="321" y="299" fill="#276749" font-family="monospace" font-size="12" font-weight="700" text-anchor="middle">APPROVE)</text>
      <text x="321" y="329" fill="#60747d" font-size="11" text-anchor="middle">no session encoded by hardware</text>
    </g>

    <path d="M408 282H438" fill="none" stroke="#78909b" stroke-width="2" marker-end="url(#arrow)"/>

    <g>
      <rect x="446" y="184" width="330" height="196" rx="6" fill="#f4f8fa" stroke="#2e7289" stroke-width="2"/>
      <text x="468" y="211" fill="#174e62" font-family="monospace" font-size="14" font-weight="700">daemon._handle_action()</text>

      <rect x="468" y="228" width="286" height="30" rx="5" fill="#ffffff" stroke="#9db2bb"/>
      <circle cx="486" cy="243" r="9" fill="#276749"/>
      <path d="M481 243L485 247L492 238" fill="none" stroke="#ffffff" stroke-width="2"/>
      <text x="504" y="247" fill="#314c57" font-size="12" font-weight="700">Identity:</text>
      <text x="558" y="247" fill="#314c57" font-size="12">session-b is selected</text>

      <rect x="468" y="266" width="286" height="30" rx="5" fill="#ffffff" stroke="#9db2bb"/>
      <circle cx="486" cy="281" r="9" fill="#276749"/>
      <path d="M481 281L485 285L492 276" fill="none" stroke="#ffffff" stroke-width="2"/>
      <text x="504" y="285" fill="#314c57" font-size="12" font-weight="700">State:</text>
      <text x="547" y="285" fill="#314c57" font-size="12">approval permits Approve</text>

      <rect x="468" y="304" width="286" height="30" rx="5" fill="#ffffff" stroke="#9db2bb"/>
      <circle cx="486" cy="319" r="9" fill="#276749"/>
      <path d="M481 319L485 323L492 314" fill="none" stroke="#ffffff" stroke-width="2"/>
      <text x="504" y="323" fill="#314c57" font-size="12" font-weight="700">Capability:</text>
      <text x="574" y="323" fill="#314c57" font-size="12">live subscriber matches</text>

      <rect x="468" y="342" width="286" height="24" rx="5" fill="#ffffff" stroke="#9db2bb"/>
      <circle cx="486" cy="354" r="8" fill="#276749"/>
      <path d="M481 354L485 358L491 349" fill="none" stroke="#ffffff" stroke-width="2"/>
      <text x="504" y="358" fill="#314c57" font-size="12" font-weight="700">Debounce:</text>
      <text x="572" y="358" fill="#314c57" font-size="12">press accepted</text>
    </g>

    <path d="M776 282H816" fill="none" stroke="#276749" stroke-width="3" marker-end="url(#deliver-arrow)"/>
    <text x="796" y="271" fill="#276749" font-size="10" font-weight="700" text-anchor="middle">ONE</text>

    <g>
      <rect x="824" y="184" width="352" height="244" rx="6" fill="#f4f8fa" stroke="#2e7289" stroke-width="2"/>

      <rect x="846" y="207" width="308" height="42" rx="6" fill="#f7f8f9" stroke="#b4c1c7"/>
      <circle cx="864" cy="228" r="7" fill="#00aebb" opacity="0.55"/>
      <text x="880" y="224" fill="#536871" font-family="monospace" font-size="11">session-a / approve</text>
      <text x="1134" y="232" fill="#8b9ba2" font-size="10" text-anchor="end">NOT SELECTED</text>

      <rect x="842" y="258" width="316" height="60" rx="6" fill="#f3faf5" stroke="#35a94a" stroke-width="3"/>
      <circle cx="864" cy="288" r="8" fill="#c83ec9"/>
      <text x="882" y="280" fill="#314c57" font-family="monospace" font-size="12" font-weight="700">session-b / c42a</text>
      <text x="882" y="300" fill="#276749" font-size="11" font-weight="700">OLDEST MATCHING REQUEST</text>
      <rect x="1077" y="274" width="61" height="28" rx="5" fill="#35a94a"/>
      <text x="1108" y="292" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle">DELIVER</text>

      <rect x="846" y="327" width="308" height="42" rx="6" fill="#fffafe" stroke="#ba61bb"/>
      <circle cx="864" cy="348" r="7" fill="#c83ec9" opacity="0.65"/>
      <text x="880" y="344" fill="#536871" font-family="monospace" font-size="11">session-b / d91e</text>
      <text x="1134" y="352" fill="#803681" font-size="10" text-anchor="end">NEXT REQUEST</text>

      <rect x="846" y="378" width="308" height="32" rx="6" fill="#f7f8f9" stroke="#b4c1c7"/>
      <circle cx="864" cy="394" r="7" fill="#70b92d" opacity="0.55"/>
      <text x="880" y="398" fill="#536871" font-family="monospace" font-size="11">session-c / approve</text>
      <text x="1134" y="398" fill="#8b9ba2" font-size="10" text-anchor="end">NOT SELECTED</text>
    </g>

    <rect x="24" y="454" width="1152" height="44" rx="6" fill="#f3faf5" stroke="#6aa57e"/>
    <circle cx="48" cy="476" r="10" fill="#276749"/>
    <text x="48" y="480" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">1</text>
    <text x="70" y="480" fill="#314c57" font-size="12" font-weight="700">One press, one recipient.</text>
    <text x="214" y="480" fill="#314c57" font-size="12">The c42a one-shot capability is removed before delivery; d91e remains independently pending. Actions are never broadcast.</text>
  </g>
</svg>
