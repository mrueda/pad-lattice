<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 900" role="img" aria-labelledby="title description">
  <title id="title">When an AI agent needs you, your desk tells you</title>
  <desc id="description">A Codex CLI session requests approval. A physical MIDI pad and a phone display the same amber state. A person presses the green approval control and the selected agent continues.</desc>
  <defs>
    <filter id="mobile-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#18232b" flood-opacity=".18"/>
    </filter>
    <filter id="mobile-amber-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#d39a18" flood-opacity=".66"/>
    </filter>
    <filter id="mobile-green-glow" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#35a94a" flood-opacity=".72"/>
    </filter>
    <marker id="mobile-state-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#00aebb"/>
    </marker>
    <marker id="mobile-action-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#35a94a"/>
    </marker>
    <pattern id="mobile-hardware-grid" width="27" height="27" patternUnits="userSpaceOnUse">
      <rect x="1" y="1" width="21" height="21" rx="4" fill="#171e24" stroke="#35404a" stroke-width="1.3"/>
    </pattern>
    <pattern id="mobile-phone-grid" width="7" height="7" patternUnits="userSpaceOnUse">
      <rect x="1" y="1" width="4.7" height="4.7" rx="1" fill="#182028" stroke="#35404a" stroke-width=".6"/>
    </pattern>
    <g id="mobile-pointer-hand">
      <path d="M28 137H88V178H28Z" fill="#3674e8" stroke="#245ebc" stroke-width="3"/>
      <path d="M50 0C42 0 37 6 37 14V91L23 73C18 66 8 65 2 71C-4 77-3 85 2 92L31 133C37 142 47 147 58 147H84C101 147 114 133 114 116V67C114 59 108 53 100 53C94 53 90 56 87 61V52C87 44 81 38 73 38C67 38 62 42 60 47V14C60 6 57 0 50 0Z" fill="#d6a27f" stroke="#8f654c" stroke-width="3" stroke-linejoin="round"/>
      <path d="M42 15C44 9 48 7 54 8" fill="none" stroke="#edc2a7" stroke-width="3" stroke-linecap="round"/>
    </g>
  </defs>

  <rect width="480" height="900" fill="#f2f6f8"/>
  <rect y="785" width="480" height="115" fill="#d9e3e8"/>
  <path d="M0 785H480" stroke="#b9c8cf" stroke-width="2"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="20" y="30" fill="#047857" font-size="11" font-weight="800">A REAL PAD-LATTICE WORKFLOW</text>
    <text x="20" y="65" fill="#17202a" font-size="25" font-weight="800">When an agent needs you,</text>
    <text x="20" y="95" fill="#17202a" font-size="25" font-weight="800">your desk tells you.</text>
    <text x="20" y="123" fill="#5d6877" font-size="14">Use a MIDI pad, a browser, or both.</text>

    <!-- Codex monitor -->
    <g filter="url(#mobile-shadow)">
      <rect x="20" y="150" width="440" height="278" rx="8" fill="#26313a"/>
      <rect x="32" y="162" width="416" height="244" rx="4" fill="#0b1015"/>
    </g>
    <circle cx="49" cy="180" r="4" fill="#cf3f42"/>
    <circle cx="63" cy="180" r="4" fill="#d39a18"/>
    <circle cx="77" cy="180" r="4" fill="#35a94a"/>
    <text x="94" y="184" fill="#dce5e9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700">CODEX CLI / REVIEW</text>
    <path d="M48 197H432" stroke="#28323a"/>
    <text x="49" y="221" fill="#edf2f5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">Ready to commit the reviewed changes.</text>

    <rect x="48" y="241" width="366" height="105" rx="6" fill="#171e24" stroke="#d39a18" stroke-width="2"/>
    <rect x="48" y="241" width="6" height="105" rx="3" fill="#d39a18"/>
    <circle cx="75" cy="270" r="8" fill="#d39a18" filter="url(#mobile-amber-glow)"/>
    <text x="93" y="274" fill="#f1ad72" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700">PERMISSION REQUIRED</text>
    <text x="73" y="305" fill="#edf2f5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">Approve the release commit?</text>
    <text x="73" y="329" fill="#aeb9c0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">Waiting for your decision...</text>

    <path d="M50 375l7 7 13-16" fill="none" stroke="#55c76a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="80" y="382" fill="#8ee0af" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700">Approved from Pad-Lattice</text>
    <text x="324" y="382" fill="#71808a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">Continuing...</text>

    <path d="M195 428v22" stroke="#65727b" stroke-width="14"/>
    <path d="M151 450H281L270 461H162Z" fill="#26313a"/>

    <!-- Vertical state and action loop -->
    <path d="M182 464v36" fill="none" stroke="#00aebb" stroke-width="3" marker-end="url(#mobile-state-arrow)"/>
    <text x="150" y="486" fill="#176a72" font-size="10" font-weight="800" text-anchor="end">STATE</text>
    <path d="M266 500v-36" fill="none" stroke="#35a94a" stroke-width="3" marker-end="url(#mobile-action-arrow)"/>
    <text x="298" y="486" fill="#247638" font-size="10" font-weight="800">ACTION</text>

    <!-- Physical MIDI pad -->
    <g filter="url(#mobile-shadow)">
      <rect x="18" y="510" width="320" height="303" rx="14" fill="#0e1319"/>
      <rect x="29" y="521" width="298" height="280" rx="9" fill="#151c22" stroke="#303942" stroke-width="2"/>
    </g>
    <text x="45" y="543" fill="#8f9ba4" font-size="9" font-weight="800">PHYSICAL MIDI PAD</text>

    <g>
      <circle cx="51" cy="567" r="10" fill="#35a94a" stroke="#86d893" stroke-width="2" filter="url(#mobile-green-glow)"/>
      <path d="M46 567l3 3 7-8" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="78" cy="567" r="10" fill="#cf3f42" stroke="#ed8587" stroke-width="2"/>
      <path d="M74 563l8 8m0-8l-8 8" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="105" cy="567" r="10" fill="#171e24" stroke="#35404a"/>
      <circle cx="132" cy="567" r="10" fill="#171e24" stroke="#35404a"/>
      <circle cx="159" cy="567" r="10" fill="#171e24" stroke="#35404a"/>
      <circle cx="186" cy="567" r="10" fill="#171e24" stroke="#35404a"/>
      <circle cx="213" cy="567" r="10" fill="#171e24" stroke="#35404a"/>
      <circle cx="240" cy="567" r="10" fill="#171e24" stroke="#35404a"/>
    </g>

    <rect x="43" y="588" width="216" height="216" fill="url(#mobile-hardware-grid)"/>
    <g fill="#d39a18" stroke="#eec35c" stroke-width="1.3" filter="url(#mobile-amber-glow)">
      <rect x="124" y="616" width="21" height="21" rx="4"/>
      <rect x="124" y="643" width="21" height="21" rx="4"/>
      <rect x="124" y="670" width="21" height="21" rx="4"/>
      <rect x="124" y="724" width="21" height="21" rx="4"/>
    </g>
    <rect x="232" y="616" width="21" height="21" rx="4" fill="#3674e8" stroke="#7fb1ef" stroke-width="1.3"/>
    <rect x="232" y="643" width="21" height="21" rx="4" fill="#d39a18" stroke="#eec35c" stroke-width="1.3"/>
    <rect x="232" y="670" width="21" height="21" rx="4" fill="#35a94a" stroke="#78d187" stroke-width="1.3"/>

    <g>
      <circle cx="292" cy="601" r="10" fill="#00aebb" stroke="#62d6df" stroke-width="2"/>
      <circle cx="292" cy="628" r="13" fill="#c83ec9" stroke="#ffffff" stroke-width="3"/>
      <circle cx="292" cy="655" r="10" fill="#70b92d" stroke="#a9dc74" stroke-width="2"/>
      <circle cx="292" cy="682" r="10" fill="#171e24" stroke="#35404a"/>
      <circle cx="292" cy="709" r="10" fill="#171e24" stroke="#35404a"/>
      <circle cx="292" cy="736" r="10" fill="#171e24" stroke="#35404a"/>
      <circle cx="292" cy="763" r="10" fill="#171e24" stroke="#35404a"/>
      <circle cx="292" cy="790" r="10" fill="#171e24" stroke="#35404a"/>
    </g>

    <!-- Phone virtual pad -->
    <g filter="url(#mobile-shadow)">
      <rect x="357" y="548" width="105" height="220" rx="18" fill="#1c252d"/>
      <rect x="368" y="570" width="83" height="166" rx="6" fill="#0b1015" stroke="#3d4851"/>
    </g>
    <rect x="377" y="584" width="63" height="63" fill="url(#mobile-phone-grid)"/>
    <rect x="398" y="591" width="4.7" height="4.7" rx="1" fill="#d39a18"/>
    <rect x="398" y="598" width="4.7" height="4.7" rx="1" fill="#d39a18"/>
    <rect x="398" y="605" width="4.7" height="4.7" rx="1" fill="#d39a18"/>
    <rect x="398" y="619" width="4.7" height="4.7" rx="1" fill="#d39a18"/>
    <circle cx="382" cy="659" r="6" fill="#35a94a"/>
    <circle cx="398" cy="659" r="6" fill="#cf3f42"/>
    <circle cx="433" cy="659" r="7" fill="#c83ec9" stroke="#ffffff" stroke-width="1.5"/>
    <text x="409" y="686" fill="#f1f5f7" font-size="8" font-weight="800" text-anchor="middle">APPROVAL NEEDED</text>
    <text x="409" y="715" fill="#8ee0af" font-size="8" font-weight="800" text-anchor="middle">TAP APPROVE</text>
    <rect x="392" y="555" width="35" height="4" rx="2" fill="#53626d"/>
    <circle cx="409" cy="752" r="5" fill="#53626d"/>
    <text x="409" y="790" fill="#536871" font-size="10" font-weight="800" text-anchor="middle">VIRTUAL PAD</text>
    <path d="M339 654H350" stroke="#00aebb" stroke-width="2" stroke-dasharray="3 3"/>

    <!-- Human hand pressing Approve -->
    <use href="#mobile-pointer-hand" transform="translate(28.5 567) scale(.45)"/>
    <circle cx="51" cy="567" r="16" fill="none" stroke="#b7efc1" stroke-width="3" opacity=".78"/>

    <!-- Three beats -->
    <path d="M20 839H460" stroke="#b9c8cf"/>
    <circle cx="36" cy="866" r="13" fill="#d39a18"/>
    <text x="36" y="871" fill="#ffffff" font-size="12" font-weight="800" text-anchor="middle">1</text>
    <text x="55" y="871" fill="#314c57" font-size="11" font-weight="700">Agent asks</text>
    <circle cx="178" cy="866" r="13" fill="#00aebb"/>
    <text x="178" y="871" fill="#ffffff" font-size="12" font-weight="800" text-anchor="middle">2</text>
    <text x="197" y="871" fill="#314c57" font-size="11" font-weight="700">Surfaces light</text>
    <circle cx="337" cy="866" r="13" fill="#35a94a"/>
    <text x="337" y="871" fill="#ffffff" font-size="12" font-weight="800" text-anchor="middle">3</text>
    <text x="356" y="871" fill="#247638" font-size="11" font-weight="800">You decide</text>
  </g>
</svg>
