<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 610" role="img" aria-labelledby="title description">
  <title id="title">Pad-Lattice architecture</title>
  <desc id="description">Local Codex and agent integrations send semantic state through Wire Protocol 1 to a deterministic daemon and control plane. A SurfaceView passes through Visual Protocol 1 and may fan out through a composite surface to authenticated browsers and MIDI grid controllers. Browser and hardware actions return through the same targeted action router. Optional semantic audio plays through the host computer.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#647985"/>
    </marker>
    <marker id="returnArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#b13a43"/>
    </marker>
  </defs>
  <rect width="1200" height="610" fill="#ffffff"/>
  <g font-family="Arial, sans-serif">
    <text x="24" y="26" fill="#49616c" font-size="13" font-weight="700">AGENT INTEGRATIONS</text>
    <text x="300" y="26" fill="#49616c" font-size="13" font-weight="700">LOCAL CONTROL PLANE</text>
    <text x="646" y="26" fill="#49616c" font-size="13" font-weight="700">SURFACE CONTRACT</text>
    <text x="930" y="26" fill="#49616c" font-size="13" font-weight="700">SYNCHRONIZED SURFACES</text>

    <g>
      <rect x="24" y="46" width="224" height="78" rx="6" fill="#f2f7fb" stroke="#5e91b5" stroke-width="2"/>
      <rect x="24" y="46" width="7" height="78" rx="3" fill="#315f82"/>
      <text x="44" y="74" fill="#315f82" font-size="15" font-weight="700">Interactive Codex</text>
      <text x="44" y="98" fill="#536871" font-size="13">hooks + leased launcher</text>
      <text x="44" y="116" fill="#60747d" font-size="12">state · approvals · cleanup</text>

      <rect x="24" y="144" width="224" height="78" rx="6" fill="#f3faf5" stroke="#6aa57e" stroke-width="2"/>
      <rect x="24" y="144" width="7" height="78" rx="3" fill="#276749"/>
      <text x="44" y="172" fill="#276749" font-size="15" font-weight="700">Codex exec</text>
      <text x="44" y="196" fill="#536871" font-size="13">documented JSONL adapter</text>
      <text x="44" y="214" fill="#60747d" font-size="12">state · targeted Stop</text>

      <rect x="24" y="242" width="224" height="78" rx="6" fill="#fff8f3" stroke="#c47a45" stroke-width="2"/>
      <rect x="24" y="242" width="7" height="78" rx="3" fill="#b85c1e"/>
      <text x="44" y="270" fill="#8c4518" font-size="15" font-weight="700">Other agent adapters</text>
      <text x="44" y="294" fill="#536871" font-size="13">typed client or bounded JSON</text>
      <text x="44" y="312" fill="#60747d" font-size="12">no surface knowledge</text>
    </g>

    <path d="M248 85H272M248 183H272M248 281H272M272 85V281M272 183H296" fill="none" stroke="#647985" stroke-width="2" marker-end="url(#arrow)"/>

    <g>
      <rect x="300" y="46" width="302" height="358" rx="6" fill="#f4f8fa" stroke="#2e7289" stroke-width="2"/>
      <rect x="322" y="68" width="258" height="58" rx="6" fill="#ffffff" stroke="#9db2bb" stroke-width="1.5"/>
      <text x="451" y="92" text-anchor="middle" fill="#174e62" font-size="16" font-weight="700">Wire Protocol 1</text>
      <text x="451" y="113" text-anchor="middle" fill="#60747d" font-size="12">private Unix-domain socket</text>

      <text x="322" y="155" fill="#174e62" font-family="monospace" font-size="14" font-weight="700">daemon_runtime + ControlPlane</text>

      <rect x="322" y="174" width="258" height="54" rx="6" fill="#ffffff" stroke="#9db2bb"/>
      <circle cx="345" cy="201" r="12" fill="#315f82"/>
      <text x="345" y="206" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">1</text>
      <text x="370" y="197" fill="#314c57" font-size="14" font-weight="700">Session registry</text>
      <text x="370" y="216" fill="#60747d" font-size="12">identity · state · slot · accent</text>

      <rect x="322" y="244" width="258" height="54" rx="6" fill="#ffffff" stroke="#9db2bb"/>
      <circle cx="345" cy="271" r="12" fill="#276749"/>
      <text x="345" y="276" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">2</text>
      <text x="370" y="267" fill="#314c57" font-size="14" font-weight="700">Selection + leases</text>
      <text x="370" y="286" fill="#60747d" font-size="12">focus · labels · lifecycle</text>

      <rect x="322" y="314" width="258" height="66" rx="6" fill="#ffffff" stroke="#9db2bb"/>
      <circle cx="345" cy="347" r="12" fill="#b13a43"/>
      <text x="345" y="352" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">3</text>
      <text x="370" y="340" fill="#314c57" font-size="14" font-weight="700">Targeted action router</text>
      <text x="370" y="359" fill="#60747d" font-size="12">state · capability · request</text>
      <text x="370" y="374" fill="#60747d" font-size="12">one recipient · never broadcast</text>
    </g>

    <path d="M602 222H642" fill="none" stroke="#647985" stroke-width="2" marker-end="url(#arrow)"/>

    <g>
      <rect x="646" y="46" width="238" height="358" rx="6" fill="#f7f5fb" stroke="#80629a" stroke-width="2"/>
      <rect x="668" y="68" width="194" height="72" rx="6" fill="#ffffff" stroke="#9f8db0"/>
      <text x="765" y="94" text-anchor="middle" fill="#5f3b79" font-family="monospace" font-size="16" font-weight="700">SurfaceView</text>
      <text x="765" y="116" text-anchor="middle" fill="#60747d" font-size="12">selected state · sessions</text>
      <text x="765" y="132" text-anchor="middle" fill="#60747d" font-size="12">capabilities · overflow</text>

      <path d="M765 140V164" fill="none" stroke="#647985" stroke-width="2" marker-end="url(#arrow)"/>

      <rect x="668" y="168" width="194" height="72" rx="6" fill="#ffffff" stroke="#9f8db0"/>
      <text x="765" y="194" text-anchor="middle" fill="#5f3b79" font-size="16" font-weight="700">Visual Protocol 1</text>
      <text x="765" y="216" text-anchor="middle" fill="#60747d" font-size="12">glyphs · semantic tokens</text>
      <text x="765" y="232" text-anchor="middle" fill="#60747d" font-size="12">identity · state · actions</text>

      <path d="M765 240V264" fill="none" stroke="#647985" stroke-width="2" marker-end="url(#arrow)"/>

      <rect x="668" y="268" width="194" height="102" rx="6" fill="#ffffff" stroke="#9f8db0"/>
      <text x="765" y="296" text-anchor="middle" fill="#5f3b79" font-size="15" font-weight="700">ControlSurface</text>
      <text x="765" y="320" text-anchor="middle" fill="#60747d" font-size="12">render(view)</text>
      <text x="765" y="338" text-anchor="middle" fill="#60747d" font-size="12">poll_events()</text>
      <text x="765" y="360" text-anchor="middle" fill="#276749" font-size="12" font-weight="700">CompositeSurface: 1 → many</text>
    </g>

    <path d="M884 172H916V130H926" fill="none" stroke="#647985" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M884 306H916V335H926" fill="none" stroke="#647985" stroke-width="2" marker-end="url(#arrow)"/>

    <g>
      <rect x="930" y="46" width="246" height="174" rx="6" fill="#f2f7fb" stroke="#5e91b5" stroke-width="2"/>
      <text x="952" y="75" fill="#315f82" font-size="16" font-weight="700">Browser surface</text>
      <text x="952" y="99" fill="#536871" font-size="13">desktop · phone · tablet</text>
      <rect x="952" y="115" width="202" height="72" rx="6" fill="#ffffff" stroke="#9db2bb"/>
      <text x="1053" y="140" text-anchor="middle" fill="#315f82" font-size="13" font-weight="700">Web Surface Protocol 1</text>
      <text x="1053" y="160" text-anchor="middle" fill="#60747d" font-size="12">same origin · authenticated</text>
      <text x="1053" y="178" text-anchor="middle" fill="#60747d" font-size="12">sanitized state · paired LAN</text>
      <text x="952" y="207" fill="#60747d" font-size="12">React UI served by the local process</text>

      <rect x="930" y="246" width="246" height="174" rx="6" fill="#fff8f3" stroke="#c47a45" stroke-width="2"/>
      <text x="952" y="275" fill="#8c4518" font-size="16" font-weight="700">MIDI grid surface</text>
      <text x="952" y="299" fill="#536871" font-size="13">Launchpad or compatible device</text>
      <rect x="952" y="315" width="202" height="72" rx="6" fill="#ffffff" stroke="#c9a68e"/>
      <text x="1053" y="340" text-anchor="middle" fill="#8c4518" font-size="13" font-weight="700">Profile + trusted driver</text>
      <text x="1053" y="360" text-anchor="middle" fill="#60747d" font-size="12">palette · addresses · mode</text>
      <text x="1053" y="378" text-anchor="middle" fill="#60747d" font-size="12">LED output · physical input</text>
      <text x="952" y="407" fill="#60747d" font-size="12">exclusive MIDI ownership</text>
    </g>

    <path d="M930 198H902V452H604V347" fill="none" stroke="#b13a43" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#returnArrow)"/>
    <path d="M930 398H902" fill="none" stroke="#b13a43" stroke-width="2" stroke-dasharray="7 6"/>
    <text x="655" y="470" fill="#9b3030" font-size="12" font-weight="700">SCENE SELECTION + TARGETED ACTIONS</text>

    <text x="300" y="500" fill="#49616c" font-size="12" font-weight="700">OPTIONAL SEMANTIC AUDIO</text>
    <path d="M498 404V486H642" fill="none" stroke="#647985" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="646" y="492" width="238" height="64" rx="6" fill="#f3faf5" stroke="#6aa57e" stroke-width="2"/>
    <text x="668" y="519" fill="#276749" font-size="15" font-weight="700">Earcon adapter</text>
    <text x="668" y="541" fill="#60747d" font-size="12">semantic cue · nonblocking</text>
    <path d="M884 524H926" fill="none" stroke="#647985" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="930" y="492" width="246" height="64" rx="6" fill="#fff8f3" stroke="#c47a45" stroke-width="2"/>
    <text x="952" y="519" fill="#8c4518" font-size="15" font-weight="700">Host computer audio</text>
    <text x="952" y="541" fill="#60747d" font-size="12">generated WAV · system player</text>

    <line x1="24" y1="588" x2="76" y2="588" stroke="#647985" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="90" y="593" fill="#60747d" font-size="12">state + rendered output</text>
    <line x1="252" y1="588" x2="304" y2="588" stroke="#b13a43" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#returnArrow)"/>
    <text x="318" y="593" fill="#60747d" font-size="12">selection + targeted actions</text>
  </g>
</svg>
