<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title description">
  <title id="title">Physical and virtual surfaces controlling Codex CLI agents through Pad-Lattice</title>
  <desc id="description">A physical Launchpad and virtual browser surfaces exchange synchronized state and targeted actions with Pad-Lattice. Pad-Lattice keeps one Agent Scene selected and routes an action only to that selected Codex CLI session.</desc>
  <defs>
    <marker id="state-left" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#00aebb"/>
    </marker>
    <marker id="action-right" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#b64141"/>
    </marker>
    <rect id="overview-pad" width="17" height="17" rx="3" fill="#202731" stroke="#3c4755"/>
  </defs>

  <rect width="1200" height="520" fill="#ffffff"/>
  <g font-family="Arial, sans-serif">
    <text x="30" y="28" fill="#49616c" font-size="14" font-weight="700">PHYSICAL AND VIRTUAL CONTROL SURFACES</text>
    <text x="450" y="28" fill="#49616c" font-size="14" font-weight="700">PAD-LATTICE</text>
    <text x="850" y="28" fill="#49616c" font-size="14" font-weight="700">CODEX CLI AGENTS</text>

    <g>
      <rect x="30" y="54" width="325" height="180" rx="7" fill="#f2fbfc" stroke="#4aa4ad" stroke-width="2"/>
      <text x="52" y="82" fill="#176a72" font-size="14" font-weight="700">PHYSICAL SURFACE</text>
      <text x="52" y="105" fill="#314c57" font-size="18" font-weight="700">MIDI grid controller</text>
      <text x="52" y="128" fill="#60747d" font-size="13">Tactile input + RGB feedback</text>

      <rect x="218" y="76" width="111" height="135" rx="7" fill="#111827" stroke="#374151" stroke-width="2"/>
      <g>
        <use href="#overview-pad" x="230" y="90"/><use href="#overview-pad" x="253" y="90"/><use href="#overview-pad" x="276" y="90"/><use href="#overview-pad" x="299" y="90"/>
        <use href="#overview-pad" x="230" y="113"/><rect x="253" y="113" width="17" height="17" rx="3" fill="#d39a18"/><rect x="276" y="113" width="17" height="17" rx="3" fill="#d39a18"/><use href="#overview-pad" x="299" y="113"/>
        <use href="#overview-pad" x="230" y="136"/><rect x="253" y="136" width="17" height="17" rx="3" fill="#d39a18"/><rect x="276" y="136" width="17" height="17" rx="3" fill="#d39a18"/><use href="#overview-pad" x="299" y="136"/>
        <rect x="230" y="159" width="17" height="17" rx="3" fill="#35a94a"/><use href="#overview-pad" x="253" y="159"/><use href="#overview-pad" x="276" y="159"/><rect x="299" y="159" width="17" height="17" rx="3" fill="#cf3f42"/>
        <circle cx="238.5" cy="194" r="8.5" fill="#00aebb"/><circle cx="261.5" cy="194" r="8.5" fill="#c83ec9" stroke="#ffffff" stroke-width="2"/><circle cx="284.5" cy="194" r="8.5" fill="#70b92d"/><circle cx="307.5" cy="194" r="8.5" fill="#202731" stroke="#3c4755"/>
      </g>

      <rect x="30" y="260" width="325" height="180" rx="7" fill="#eff6ff" stroke="#6791d5" stroke-width="2"/>
      <text x="52" y="288" fill="#315f82" font-size="14" font-weight="700">VIRTUAL SURFACES</text>
      <text x="52" y="311" fill="#314c57" font-size="18" font-weight="700">Browser controls</text>
      <text x="52" y="334" fill="#60747d" font-size="13">Desktop + phone + tablet</text>

      <rect x="211" y="287" width="45" height="78" rx="7" fill="#ffffff" stroke="#3674e8" stroke-width="3"/>
      <rect x="218" y="296" width="31" height="55" rx="3" fill="#111827"/>
      <circle cx="233.5" cy="358" r="3" fill="#3674e8"/>
      <rect x="269" y="300" width="66" height="47" rx="4" fill="#ffffff" stroke="#00aebb" stroke-width="3"/>
      <rect x="276" y="307" width="52" height="33" rx="2" fill="#111827"/>
      <path d="M262 355H342L334 365H270Z" fill="#d8eef0" stroke="#4aa4ad"/>
      <g>
        <rect x="221" y="308" width="7" height="7" rx="2" fill="#d39a18"/><rect x="230" y="308" width="7" height="7" rx="2" fill="#d39a18"/>
        <rect x="221" y="317" width="7" height="7" rx="2" fill="#202731"/><rect x="230" y="317" width="7" height="7" rx="2" fill="#202731"/>
        <circle cx="244" cy="311.5" r="3.5" fill="#c83ec9"/>
        <rect x="282" y="313" width="9" height="9" rx="2" fill="#d39a18"/><rect x="294" y="313" width="9" height="9" rx="2" fill="#d39a18"/>
        <rect x="282" y="325" width="9" height="9" rx="2" fill="#35a94a"/><rect x="294" y="325" width="9" height="9" rx="2" fill="#cf3f42"/>
        <circle cx="316" cy="317.5" r="4.5" fill="#c83ec9"/>
      </g>
      <rect x="211" y="387" width="124" height="29" rx="5" fill="#dbeafe" stroke="#93b4e7"/>
      <text x="273" y="406" fill="#315f82" font-size="11" font-weight="700" text-anchor="middle">SAME VISUAL LANGUAGE</text>
    </g>

    <path d="M435 139H365" fill="none" stroke="#00aebb" stroke-width="3"/>
    <path d="M365 139L377 132V146Z" fill="#00aebb"/>
    <text x="400" y="128" fill="#176a72" font-size="11" font-weight="700" text-anchor="middle">STATE</text>
    <path d="M365 188H435" fill="none" stroke="#b64141" stroke-width="3"/>
    <path d="M435 188L423 181V195Z" fill="#b64141"/>
    <text x="400" y="207" fill="#9b3030" font-size="11" font-weight="700" text-anchor="middle">ACTION</text>

    <path d="M435 337H365" fill="none" stroke="#00aebb" stroke-width="3"/>
    <path d="M365 337L377 330V344Z" fill="#00aebb"/>
    <text x="400" y="326" fill="#176a72" font-size="11" font-weight="700" text-anchor="middle">STATE</text>
    <path d="M365 386H435" fill="none" stroke="#b64141" stroke-width="3"/>
    <path d="M435 386L423 379V393Z" fill="#b64141"/>
    <text x="400" y="405" fill="#9b3030" font-size="11" font-weight="700" text-anchor="middle">ACTION</text>

    <g>
      <rect x="450" y="54" width="300" height="386" rx="7" fill="#f4f8fa" stroke="#2e7289" stroke-width="2"/>
      <rect x="472" y="76" width="256" height="58" rx="6" fill="#174e62"/>
      <circle cx="498" cy="105" r="9" fill="#35a94a"/>
      <text x="518" y="102" fill="#ffffff" font-size="17" font-weight="700">PAD-LATTICE</text>
      <text x="518" y="120" fill="#c9e6ee" font-size="12">One local control plane</text>

      <rect x="472" y="154" width="256" height="119" rx="6" fill="#ffffff" stroke="#9db2bb"/>
      <text x="600" y="180" fill="#174e62" font-size="15" font-weight="700" text-anchor="middle">SHARED AGENT SCENES</text>
      <circle cx="520" cy="218" r="20" fill="#00aebb"/>
      <text x="520" y="224" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">1</text>
      <circle cx="575" cy="218" r="24" fill="#c83ec9" stroke="#174e62" stroke-width="4"/>
      <text x="575" y="224" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">2</text>
      <circle cx="634" cy="218" r="20" fill="#70b92d"/>
      <text x="634" y="224" fill="#111827" font-size="16" font-weight="700" text-anchor="middle">3</text>
      <circle cx="689" cy="218" r="20" fill="#3788d8"/>
      <text x="689" y="224" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">4</text>
      <text x="600" y="257" fill="#60747d" font-size="12" text-anchor="middle">Scene 2 is selected everywhere</text>

      <rect x="472" y="293" width="256" height="119" rx="6" fill="#fff8e7" stroke="#d39a18"/>
      <text x="600" y="321" fill="#895f08" font-size="15" font-weight="700" text-anchor="middle">TARGETED ACTION ROUTING</text>
      <rect x="501" y="343" width="88" height="39" rx="6" fill="#35a94a" stroke="#78d187"/>
      <text x="545" y="367" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">APPROVE</text>
      <path d="M600 362H676" fill="none" stroke="#b64141" stroke-width="3"/>
      <path d="M676 362L664 355V369Z" fill="#b64141"/>
      <text x="600" y="398" fill="#60747d" font-size="12" text-anchor="middle">One action reaches one selected agent</text>
    </g>

    <path d="M835 145H765" fill="none" stroke="#00aebb" stroke-width="3"/>
    <path d="M765 145L777 138V152Z" fill="#00aebb"/>
    <text x="800" y="134" fill="#176a72" font-size="11" font-weight="700" text-anchor="middle">STATE</text>
    <path d="M765 331H835" fill="none" stroke="#b64141" stroke-width="3"/>
    <path d="M835 331L823 324V338Z" fill="#b64141"/>
    <text x="800" y="350" fill="#9b3030" font-size="11" font-weight="700" text-anchor="middle">ACTION</text>

    <g>
      <rect x="850" y="54" width="320" height="386" rx="7" fill="#f7f8f9" stroke="#8fa2ab" stroke-width="2"/>
      <rect x="872" y="76" width="276" height="55" rx="6" fill="#111827"/>
      <circle cx="895" cy="103" r="6" fill="#35a94a"/>
      <circle cx="914" cy="103" r="6" fill="#d39a18"/>
      <circle cx="933" cy="103" r="6" fill="#cf3f42"/>
      <text x="960" y="109" fill="#ffffff" font-family="monospace" font-size="16" font-weight="700">CODEX CLI</text>

      <rect x="872" y="151" width="276" height="73" rx="6" fill="#f2fbfc" stroke="#00aebb" stroke-width="2"/>
      <rect x="872" y="151" width="7" height="73" rx="3" fill="#00aebb"/>
      <text x="895" y="176" fill="#176a72" font-size="12" font-weight="700">SCENE 1 / IMPLEMENTATION</text>
      <circle cx="900" cy="199" r="6" fill="#3674e8"/>
      <text x="914" y="203" fill="#60747d" font-size="12">running</text>

      <rect x="872" y="241" width="276" height="86" rx="6" fill="#fcf5fc" stroke="#c83ec9" stroke-width="3"/>
      <rect x="872" y="241" width="7" height="86" rx="3" fill="#c83ec9"/>
      <text x="895" y="267" fill="#803681" font-size="12" font-weight="700">SCENE 2 / REVIEW</text>
      <circle cx="900" cy="291" r="6" fill="#d39a18"/>
      <text x="914" y="295" fill="#60747d" font-size="12">waiting for approval</text>
      <rect x="1043" y="279" width="83" height="25" rx="5" fill="#c83ec9"/>
      <text x="1084.5" y="296" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle">SELECTED</text>

      <rect x="872" y="344" width="276" height="73" rx="6" fill="#f6faef" stroke="#70b92d" stroke-width="2"/>
      <rect x="872" y="344" width="7" height="73" rx="3" fill="#70b92d"/>
      <text x="895" y="369" fill="#527727" font-size="12" font-weight="700">SCENE 3 / DOCS</text>
      <circle cx="900" cy="392" r="6" fill="#ffffff" stroke="#7f929b"/>
      <text x="914" y="396" fill="#60747d" font-size="12">waiting for reply</text>
    </g>

    <rect x="30" y="468" width="1140" height="35" rx="6" fill="#f4f8fa" stroke="#b8cbd2"/>
    <line x1="105" y1="486" x2="54" y2="486" stroke="#00aebb" stroke-width="3"/>
    <path d="M54 486L66 479V493Z" fill="#00aebb"/>
    <text x="122" y="491" fill="#174e62" font-size="12" font-weight="700">STATE FLOWS BACK</text>
    <text x="251" y="491" fill="#536871" font-size="12">to every connected surface.</text>
    <line x1="510" y1="486" x2="561" y2="486" stroke="#b64141" stroke-width="3"/>
    <path d="M561 486L549 479V493Z" fill="#b64141"/>
    <text x="578" y="491" fill="#9b3030" font-size="12" font-weight="700">ACTIONS FLOW FORWARD</text>
    <text x="742" y="491" fill="#536871" font-size="12">to the selected Codex session only.</text>
  </g>
</svg>
