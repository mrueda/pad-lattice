      <rect x="58" y="18" width="160" height="160" rx="6" fill="url(#pad-grid)"/>
      <g>
        <circle cx="75" cy="39" r="6" fill="#00aebb"/><circle cx="202" cy="38" r="6" fill="#c83ec9"/>
        <circle cx="81" cy="151" r="6" fill="#70b92d"/><circle cx="200" cy="151" r="6" fill="#f0b429"/>
        <circle cx="72" cy="94" r="6" fill="#7656c7"/><circle cx="207" cy="94" r="6" fill="#00a88f"/>
        <circle cx="137" cy="32" r="6" fill="#d94c76"/><circle cx="137" cy="160" r="6" fill="#3788d8"/>
      </g>
      <g fill="none" stroke="#718994" stroke-width="2">
        <path d="M75 39L137 94L202 38M81 151L137 94L200 151M72 94H207M137 32V160"/>
      </g>
      <text x="137" y="117" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="58" font-weight="700">PL</text>
      <text x="137.5" y="202" text-anchor="middle" fill="#174e62" font-size="15" font-weight="700">CONSTELLATION</text>
      <text x="137.5" y="220" text-anchor="middle" fill="#60747d" font-size="12">celebration</text>
    </g>
  </g>
</svg>
