      <rect x="58" y="18" width="160" height="160" rx="6" fill="url(#pad-grid)"/>
      <path d="M137 62C112 32 72 58 137 126C202 58 162 32 137 62Z" fill="none" stroke="#596f7a" stroke-width="9"/>
      <path d="M173 30L135 82H158L113 151L128 94H105L145 30Z" fill="#cf3f42" stroke="#f0b429" stroke-width="3"/>
