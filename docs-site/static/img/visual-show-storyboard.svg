<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title description">
  <title id="title">A Spark Becomes a Constellation storyboard</title>
  <desc id="description">Eight colored scenes show a lonely cyan spark becoming an idea, asking a question, finding a magenta friend, surviving a red storm, calling for help, joining a community, and becoming the Pad-Lattice constellation.</desc>
  <defs>
    <pattern id="pad-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect x="1" y="1" width="16" height="16" rx="3" fill="#111820" stroke="#26333e"/>
    </pattern>
  </defs>
  <rect width="1200" height="560" fill="#ffffff"/>
  <g font-family="Arial, sans-serif">
    <text x="24" y="26" fill="#49616c" font-size="13" font-weight="700">A SPARK BECOMES A CONSTELLATION</text>

    <g transform="translate(20 42)">
      <rect width="275" height="232" rx="6" fill="#f5f8fa" stroke="#9db2bb"/>
      <rect x="58" y="18" width="160" height="160" rx="6" fill="url(#pad-grid)"/>
      <rect x="130" y="90" width="16" height="16" rx="3" fill="#00aebb"/>
      <text x="137.5" y="202" text-anchor="middle" fill="#174e62" font-size="15" font-weight="700">ALONE</text>
      <text x="137.5" y="220" text-anchor="middle" fill="#60747d" font-size="12">loneliness</text>
    </g>

    <g transform="translate(315 42)">
      <rect width="275" height="232" rx="6" fill="#f5f8fa" stroke="#9db2bb"/>
      <rect x="58" y="18" width="160" height="160" rx="6" fill="url(#pad-grid)"/>
      <g transform="translate(138 88)" fill="none" stroke="#f0b429" stroke-width="8" stroke-linecap="round">
        <circle cy="-17" r="30"/>
        <path d="M-14 12V30H14V12M-13 39H13M0-58V-69M-48-17H-59M48-17H59M-35-52L-43-60M35-52L43-60"/>
      </g>
      <circle cx="138" cy="72" r="8" fill="#ffffff"/>
      <text x="137.5" y="202" text-anchor="middle" fill="#174e62" font-size="15" font-weight="700">AN IDEA</text>
      <text x="137.5" y="220" text-anchor="middle" fill="#60747d" font-size="12">wonder</text>
    </g>

    <g transform="translate(610 42)">
      <rect width="275" height="232" rx="6" fill="#f5f8fa" stroke="#9db2bb"/>
      <rect x="58" y="18" width="160" height="160" rx="6" fill="url(#pad-grid)"/>
      <text x="99" y="126" fill="#00aebb" font-family="monospace" font-size="92" font-weight="700">?</text>
      <circle cx="171" cy="80" r="27" fill="none" stroke="#54c7d2" stroke-width="8"/>
      <path d="M190 101L211 126" stroke="#54c7d2" stroke-width="9" stroke-linecap="round"/>
      <circle cx="171" cy="80" r="5" fill="#ffffff"/>
      <text x="137.5" y="202" text-anchor="middle" fill="#174e62" font-size="15" font-weight="700">THE SEARCH</text>
      <text x="137.5" y="220" text-anchor="middle" fill="#60747d" font-size="12">curiosity</text>
    </g>

    <g transform="translate(905 42)">
      <rect width="275" height="232" rx="6" fill="#f5f8fa" stroke="#9db2bb"/>
      <rect x="58" y="18" width="160" height="160" rx="6" fill="url(#pad-grid)"/>
      <g fill="none" stroke-width="8" stroke-linecap="round">
        <circle cx="103" cy="61" r="10" stroke="#00aebb"/>
        <path d="M103 75V118M80 91H126M103 118L84 145M103 118L122 145" stroke="#00aebb"/>
