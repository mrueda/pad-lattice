      <circle cx="185" cy="119" r="7" fill="#70b92d"/>
      <circle cx="205" cy="119" r="7" fill="#c83ec9"/>
      <circle cx="193" cy="53" r="7" fill="#f0b429"/>
      <text x="137.5" y="202" text-anchor="middle" fill="#174e62" font-size="15" font-weight="700">THE CALL</text>
      <text x="137.5" y="220" text-anchor="middle" fill="#60747d" font-size="12">courage</text>
    </g>

    <g transform="translate(610 296)">
      <rect width="275" height="232" rx="6" fill="#f5f8fa" stroke="#9db2bb"/>
      <rect x="58" y="18" width="160" height="160" rx="6" fill="url(#pad-grid)"/>
      <g fill="none" stroke="#78909b" stroke-width="4">
        <path d="M80 44L137 98L196 45M79 148L137 98L198 148M80 44L79 148M196 45L198 148"/>
      </g>
      <circle cx="80" cy="44" r="10" fill="#00aebb"/>
      <circle cx="196" cy="45" r="10" fill="#c83ec9"/>
      <circle cx="79" cy="148" r="10" fill="#70b92d"/>
      <circle cx="198" cy="148" r="10" fill="#f0b429"/>
      <circle cx="137" cy="98" r="15" fill="#ffffff"/>
      <path d="M117 99L132 114L161 76" fill="none" stroke="#35a94a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="137.5" y="202" text-anchor="middle" fill="#174e62" font-size="15" font-weight="700">TOGETHER</text>
      <text x="137.5" y="220" text-anchor="middle" fill="#60747d" font-size="12">belonging and joy</text>
