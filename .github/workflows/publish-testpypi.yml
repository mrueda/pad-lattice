name: Publish to TestPyPI

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[release,schema]"
          python -c "from packaging.version import Version; from pad_lattice import __version__; assert Version(__version__).is_prerelease, 'TestPyPI releases must use a pre-release version'"
          python -m unittest discover -s tests
          python -m build
          python -m twine check dist/*

      - name: Test the built wheel
        run: |
          python -m venv /tmp/pad-lattice-wheel-test
          /tmp/pad-lattice-wheel-test/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/pad-lattice-wheel-test/bin/pad-lattice --version
          /tmp/pad-lattice-wheel-test/bin/pad-lattice --help
          /tmp/pad-lattice-wheel-test/bin/pad-lattice-hook --help
          /tmp/pad-lattice-wheel-test/bin/pad-lattice web --help
          /tmp/pad-lattice-wheel-test/bin/pad-lattice profile list
          /tmp/pad-lattice-wheel-test/bin/pad-lattice profile show novation/launchpad/pro-mk1
          /tmp/pad-lattice-wheel-test/bin/python -c "import subprocess; r=subprocess.run(['/tmp/pad-lattice-wheel-test/bin/pad-lattice-hook', '--socket', '/tmp/pad-lattice-missing.sock'], input='{}', text=True, capture_output=True, timeout=5); assert (r.returncode, r.stdout, r.stderr) == (0, '', '')"
          /tmp/pad-lattice-wheel-test/bin/python -c "from importlib import resources; root=resources.files('pad_lattice'); assert root.joinpath('web_dist/play/index.html').is_file(); assert root.joinpath('schemas/web-surface-protocol-v1.json').is_file()"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pad-lattice
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
