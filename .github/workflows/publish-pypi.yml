name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[release,schema]"

      - name: Verify annotated tag, version, and changelog
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          test "$(git cat-file -t "refs/tags/$RELEASE_TAG")" = "tag" || {
            echo "Release tag $RELEASE_TAG must be annotated"
            exit 1
          }
          python - <<'PY'
          import os
          import re
          from importlib.metadata import version as distribution_version
          from pathlib import Path

          from pad_lattice import __version__

          tag = os.environ["RELEASE_TAG"]
          match = re.fullmatch(
              r"v(?P<version>(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*))",
              tag,
          )
          if match is None:
              raise SystemExit(
                  f"Release tag {tag!r} must use stable form vX.Y.Z"
              )

          tag_version = match.group("version")
          metadata_version = distribution_version("pad-lattice")
          if tag_version != __version__:
              raise SystemExit(
                  f"Release tag {tag} does not match Python version {__version__}"
              )
          if metadata_version != __version__:
              raise SystemExit(
                  "Distribution metadata version "
                  f"{metadata_version} does not match Python version {__version__}"
              )

          headings = (
              f"## {tag_version} - ",
              f"## [{tag_version}] - ",
          )
          changelog_lines = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          if not any(line.startswith(headings) for line in changelog_lines):
              raise SystemExit(
                  f"CHANGELOG.md has no dated entry for {tag_version}"
              )
          PY

      - name: Test, build, and validate distributions
        run: |
          python -m pad_lattice.experience_compiler --check --target web-app/public/experiences
          python -m pad_lattice.experience_compiler --check --target src/pad_lattice/web_dist/play/experiences
          cmp web-app/public/experiences/demo-v1.json src/pad_lattice/web_dist/play/experiences/demo-v1.json
          python -m unittest discover -s tests
          python -m build
          python -m twine check dist/*

      - name: Test the built wheel
        run: |
          python -m venv /tmp/pad-lattice-wheel-test
          /tmp/pad-lattice-wheel-test/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/pad-lattice-wheel-test/bin/pad-lattice --version
          /tmp/pad-lattice-wheel-test/bin/pad-lattice --help
          /tmp/pad-lattice-wheel-test/bin/pad-lattice-hook --help
          /tmp/pad-lattice-wheel-test/bin/pad-lattice web --help
          /tmp/pad-lattice-wheel-test/bin/pad-lattice profile list
          /tmp/pad-lattice-wheel-test/bin/pad-lattice profile show novation/launchpad/pro-mk1
          /tmp/pad-lattice-wheel-test/bin/python -c "import subprocess; r=subprocess.run(['/tmp/pad-lattice-wheel-test/bin/pad-lattice-hook', '--socket', '/tmp/pad-lattice-missing.sock'], input='{}', text=True, capture_output=True, timeout=5); assert (r.returncode, r.stdout, r.stderr) == (0, '', '')"
          /tmp/pad-lattice-wheel-test/bin/python -c "from importlib import resources; root=resources.files('pad_lattice'); required=('web_dist/play/index.html','web_dist/play/experiences/demo-v1.json','web_dist/play/experiences/constellation-v1.json','web_dist/play/experiences/audio/constellation-v1.wav','schemas/web-surface-protocol-v1.json','schemas/demo-manifest-v1.json','schemas/performance-manifest-v1.json'); assert all(root.joinpath(*item.split('/')).is_file() for item in required)"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pad-lattice/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
