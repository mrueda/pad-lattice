name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish (for example, v0.1.0)
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[release,schema]"

      - name: Check release version
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          version=$(python -c "from pad_lattice import __version__; print(__version__)")
          tag=${RELEASE_TAG#v}
          test "$tag" = "$version" || {
            echo "Release tag $RELEASE_TAG does not match package version $version"
            exit 1
          }

      - name: Test, build, and validate distributions
        run: |
          python -m pad_lattice.experience_compiler --check
          python -m pad_lattice.experience_compiler --check --target src/pad_lattice/web_dist/play/experiences
          cmp web-app/public/experiences/demo-v1.json src/pad_lattice/web_dist/play/experiences/demo-v1.json
          python -m unittest discover -s tests
          python -m build
          python -m twine check dist/*

      - name: Test the built wheel
        run: |
          python -m venv /tmp/pad-lattice-wheel-test
          /tmp/pad-lattice-wheel-test/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/pad-lattice-wheel-test/bin/pad-lattice --version
          /tmp/pad-lattice-wheel-test/bin/pad-lattice --help
          /tmp/pad-lattice-wheel-test/bin/pad-lattice-hook --help
          /tmp/pad-lattice-wheel-test/bin/pad-lattice web --help
          /tmp/pad-lattice-wheel-test/bin/pad-lattice profile list
          /tmp/pad-lattice-wheel-test/bin/pad-lattice profile show novation/launchpad/pro-mk1
          /tmp/pad-lattice-wheel-test/bin/python -c "import subprocess; r=subprocess.run(['/tmp/pad-lattice-wheel-test/bin/pad-lattice-hook', '--socket', '/tmp/pad-lattice-missing.sock'], input='{}', text=True, capture_output=True, timeout=5); assert (r.returncode, r.stdout, r.stderr) == (0, '', '')"
          /tmp/pad-lattice-wheel-test/bin/python -c "from importlib import resources; root=resources.files('pad_lattice'); required=('web_dist/play/index.html','web_dist/play/experiences/demo-v1.json','web_dist/play/experiences/constellation-v1.json','web_dist/play/experiences/audio/constellation-v1.wav','schemas/web-surface-protocol-v1.json','schemas/demo-manifest-v1.json','schemas/performance-manifest-v1.json'); assert all(root.joinpath(*item.split('/')).is_file() for item in required)"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pad-lattice/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
