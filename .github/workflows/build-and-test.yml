name: Build and test

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    name: Python ${{ matrix.python-version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[schema]"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python files
        run: python -m compileall -q src tests

  web:
    runs-on: ubuntu-latest
    name: Virtual surface

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build

      - name: Install web dependencies
        working-directory: web-app
        run: npm ci

      - name: Verify generated experience assets
        run: python -m pad_lattice.experience_compiler --check --target web-app/public/experiences

      - name: Check and build virtual surface
        working-directory: web-app
        run: |
          npm run typecheck
          npm test
          npm run build

      - name: Verify committed web bundle
        run: git diff --exit-code -- src/pad_lattice/web_dist

      - name: Install Playwright browser
        working-directory: web-app
        run: npx playwright install --with-deps chromium

      - name: Test public and live browser modes
        working-directory: web-app
        env:
          PAD_LATTICE_PYTHON: python
        run: npm run test:e2e

      - name: Build and inspect wheel
        run: |
          python -m build --wheel
          python -c "import glob, zipfile; p=glob.glob('dist/*.whl')[0]; z=zipfile.ZipFile(p); names=set(z.namelist()); required=('web_dist/play/index.html','web_dist/play/experiences/demo-v1.json','web_dist/play/experiences/constellation-v1.json','web_dist/play/experiences/audio/constellation-v1.wav','schemas/web-surface-protocol-v1.json','schemas/demo-manifest-v1.json','schemas/performance-manifest-v1.json'); assert all(any(n.endswith(item) for n in names) for item in required); entry=next(n for n in names if n.endswith('.dist-info/entry_points.txt')); assert 'pad-lattice-hook = pad_lattice.codex_hook_entry:main' in z.read(entry).decode()"
