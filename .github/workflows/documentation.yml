name: Documentation

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install and build virtual surface
        working-directory: web-app
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build

      - name: Verify committed web bundle
        run: git diff --exit-code -- src/pad_lattice/web_dist

      - name: Install docs dependencies
        working-directory: docs-site
        run: npm ci

      - name: Typecheck docs
        working-directory: docs-site
        run: npm run typecheck

      - name: Build Docusaurus site
        working-directory: docs-site
        run: npm run build

      - name: Verify search index
        working-directory: docs-site
        run: |
          test -s build/search-index.json
          test -s build/play/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
