<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Pad-Lattice social preview</title>
  <desc id="desc">Pad-Lattice, physical and virtual pad control surfaces for AI agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1280" y1="0" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10131d"/>
      <stop offset=".56" stop-color="#161a27"/>
      <stop offset="1" stop-color="#07090f"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity=".38"/>
    </filter>
    <filter id="pad-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#ffffff" flood-opacity=".34"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <g opacity=".18" stroke="#94a3b8" stroke-width="4">
    <path d="M0 104h1280M0 232h1280M0 360h1280M0 488h1280"/>
    <path d="M104 0v640M232 0v640M360 0v640M488 0v640M616 0v640M744 0v640M872 0v640M1000 0v640M1128 0v640"/>
  </g>

  <g transform="translate(112 96)" filter="url(#soft-shadow)">
    <rect width="448" height="448" rx="86" fill="#0a0d15"/>
    <rect x="42" y="42" width="364" height="364" rx="64" fill="#171b28"/>
    <g opacity=".28" stroke="#9aa4b2" stroke-width="5" stroke-linecap="round">
      <path d="M112 112h224M112 168h224M112 224h224M112 280h224M112 336h224"/>
      <path d="M112 112v224M168 112v224M224 112v224M280 112v224M336 112v224"/>
    </g>
    <g fill="none" stroke="#f8fafc" stroke-linecap="round" opacity=".5">
      <path d="M224 122v204" stroke-width="8"/>
      <path d="M122 224h204" stroke-width="8"/>
      <circle cx="224" cy="224" r="22" stroke-width="7"/>
    </g>
    <g filter="url(#pad-glow)">
      <rect x="178" y="68" width="92" height="92" rx="20" fill="#2f80ff"/>
      <rect x="288" y="178" width="92" height="92" rx="20" fill="#ffd43b"/>
      <rect x="178" y="288" width="92" height="92" rx="20" fill="#34d058"/>
      <rect x="68" y="178" width="92" height="92" rx="20" fill="#ff4d5e"/>
    </g>
    <path d="M211 200l42 24-42 24v-16h-29v-16h29z" fill="#f8fafc"/>
    <circle cx="274" cy="224" r="8" fill="#f8fafc"/>
  </g>

  <g fill="#f8fafc">
    <text x="640" y="270" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="92" font-weight="800" letter-spacing="0">Pad-Lattice</text>
    <text x="646" y="346" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="500" fill="#cbd5e1" letter-spacing="0">Physical + virtual pads for AI agents</text>
    <text x="646" y="414" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#94a3b8" letter-spacing="0">browser / phone / MIDI / multi-agent routing</text>
  </g>
